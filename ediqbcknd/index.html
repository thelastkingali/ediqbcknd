<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibeStream | Pro Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #fe2c55; --bg: #000; --card: #161823; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; height: 100dvh; overflow: hidden; }
        
        /* DIAGNOSTIC MONITOR - Remove this later when site works */
        #debugInfo { 
            position: fixed; top: 10px; left: 10px; z-index: 9999; 
            background: rgba(0,0,0,0.8); padding: 5px 10px; font-size: 10px; 
            border: 1px solid var(--primary); pointer-events: none;
        }

        #feedContainer { 
            height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; 
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        #feedContainer::-webkit-scrollbar { display: none; }
        
        .card { 
            width: 100%; height: 100vh; scroll-snap-align: start; 
            position: relative; display: flex; align-items: center; justify-content: center;
            background: #0d0e15;
        }
        .media { width: 100%; height: 100%; object-fit: cover; position: absolute; }

        .html-content {
            width: 85%; padding: 40px 20px; border-radius: 30px;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); text-align: center; z-index: 5;
        }

        .lock-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 10; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            transition: opacity 0.5s ease; opacity: 0; pointer-events: none;
        }
        .lock-overlay.active { opacity: 1; pointer-events: all; }
        
        .skip-btn {
            margin-top: 20px; padding: 12px 25px; border-radius: 50px;
            background: var(--primary); color: #fff; border: none;
            font-weight: bold; cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <div id="debugInfo">System: Loading...</div>
    <div id="feedContainer"></div>

    <script>
        const debug = (msg) => { document.getElementById('debugInfo').innerText = "System: " + msg; };

        // 1. ASSET LIST
        const myImages = ['2.jpg', '3.jpg', '4.jpg', '5.jpg', '6.jpg', '7.jpg']; 
        
        const myBlocks = [
            { title: "Network Status", desc: "System analyzing data streams..." },
            { title: "User Analytics", desc: "Compiling latest engagement metrics." }
        ];

        const container = document.getElementById('feedContainer');

        function initFeed() {
            try {
                debug("Generating Feed...");
                myImages.forEach((imgName, index) => {
                    // Image Card
                    const imgCard = document.createElement('div');
                    imgCard.className = 'card';
                    imgCard.innerHTML = `<img class="media" src="assets/${imgName}" onerror="console.log('Failed: ${imgName}'); this.src='https://via.placeholder.com/1080x1920/161823/fe2c55?text=Missing+${imgName}'">`;
                    container.appendChild(imgCard);

                    // HTML Block
                    if (index % 2 === 0) {
                        const block = myBlocks[index % myBlocks.length];
                        const blockCard = document.createElement('div');
                        blockCard.className = 'card html-block';
                        blockCard.innerHTML = `
                            <div class="html-content">
                                <i class="fas fa-microchip" style="font-size:40px; color:var(--primary)"></i>
                                <h2 style="margin:15px 0">${block.title}</h2>
                                <p style="color:#aaa">${block.desc}</p>
                            </div>
                            <div class="lock-overlay">
                                <div class="lock-icon"><i class="fas fa-lock" style="font-size:30px"></i></div>
                                <p style="margin-top:10px">PLEASE WAIT...</p>
                                <button class="skip-btn">UNLOCKED - TAP TO SKIP</button>
                            </div>
                        `;
                        container.appendChild(blockCard);
                    }
                });
                debug("Feed Ready. Scroll Down.");
                setupIntersections();
            } catch (e) {
                debug("Error: " + e.message);
            }
        }

        function setupIntersections() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && entry.intersectionRatio > 0.8) {
                        const lock = entry.target.querySelector('.lock-overlay');
                        if (lock && !entry.target.dataset.viewed) {
                            lock.classList.add('active');
                            container.style.overflowY = 'hidden'; 
                            
                            setTimeout(() => {
                                const btn = lock.querySelector('.skip-btn');
                                if(btn) {
                                    btn.style.display = 'block';
                                    btn.onclick = () => {
                                        lock.classList.remove('active');
                                        container.style.overflowY = 'scroll';
                                        entry.target.dataset.viewed = "true";
                                    };
                                }
                            }, 5000); 
                        }
                    }
                });
            }, { threshold: 0.8 });

            document.querySelectorAll('.html-block').forEach(b => observer.observe(b));
        }

        // Run the script
        window.onload = initFeed;
    </script>
</body>
</html>
